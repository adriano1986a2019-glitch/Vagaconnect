<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagaconnect | Entrevistas por Vídeo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="p-6 bg-white shadow-sm flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg">VC</div>
            <span class="text-2xl font-bold text-gray-900 italic">Vaga<span class="gradient-text">connect</span></span>
        </div>
        <button class="bg-indigo-600 text-white px-6 py-2 rounded-full font-medium shadow-md hover:bg-indigo-700 transition">Anunciar Vaga</button>
    </nav>

    <header class="py-16 text-center px-4">
        <h1 class="text-5xl lg:text-6xl font-extrabold text-gray-900 mb-6 italic">Contrate por <span class="gradient-text">Vídeo</span></h1>
        <p class="text-xl text-gray-600 max-w-2xl mx-auto italic font-medium">Conectando empresas e talentos em tempo real em Itapevi e região.</p>
    </header>

    <main class="max-w-4xl mx-auto p-4 text-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 italic text-gray-800 text-left border-b pb-2">Vagas Disponíveis</h2>
            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100 flex flex-col md:flex-row justify-between items-center">
                <div class="text-left mb-4 md:mb-0">
                    <h3 class="text-xl font-bold text-indigo-900 italic">Auxiliar Administrativo</h3>
                    <p class="text-gray-500 italic font-medium">Itapevi, SP</p>
                </div>
                <button onclick="startVideo()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg hover:bg-indigo-700 transition">
                    <i class="fas fa-video"></i> Iniciar Entrevista Online
                </button>
            </div>
            <div id="jitsi-container" class="mt-8 rounded-2xl overflow-hidden border-4 border-indigo-100 hidden" style="height: 500px;"></div>
        </div>
    </main>

    <script>
        function startVideo() {
            const container = document.getElementById('jitsi-container');
            container.classList.remove('hidden');
            new JitsiMeetExternalAPI('meet.jit.si', {
                roomName: 'Vagaconnect-' + Math.floor(Math.random() * 10000),
                width: '100%', height: 500, parentNode: container, lang: 'pt-br'
            });
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
